            { name: "Behance", category: "Creative", description: "Adobe's professional network for creative portfolios.", url: "https://behance.net", tags: ["Portfolio"] },
            { name: "Instagram X-Ray", category: "Creative", description: "Locate designers and creative influencers via Instagram.", url: "https://www.google.com/search?q=site:instagram.com+email", tags: ["X-ray"] },
            { name: "TikTok Dev X-Ray", category: "Creative", description: "Find developers and creatives sharing work on TikTok.", url: "https://www.google.com/search?q=site:tiktok.com+%22developer%22", tags: ["X-ray"] },
            { name: "Pinterest Portfolio Search", category: "Creative", description: "Source designers and visual artists via Pinterest boards.", url: "https://www.google.com/search?q=site:pinterest.com+portfolio", tags: ["X-ray"] },

            // --- MISC & X-RAY ---
            { name: "LinkedIn Clearance X-Ray", category: "Intel", description: "Source candidates with specific security clearances on LinkedIn.", url: "https://www.google.com/search?q=site:linkedin.com/in+%22security+clearance%22", tags: ["Security"] },
            { name: "FTP Resume Search", category: "Intel", description: "X-ray search for publicly available resumes on FTP servers.", url: "https://www.google.com/search?q=intitle:index.of+resume", tags: ["X-ray"] },
            { name: "Conference Attendee X-Ray", category: "Intel", description: "X-ray search for attendee lists and speakers.", url: "https://www.google.com/search?q=intitle:attendee.list", tags: ["Events"] },
            { name: "Upwork Profile Search", category: "Data", description: "X-ray Upwork to find high-rated freelance profiles.", url: "https://www.google.com/search?q=site:upwork.com/o/profiles", tags: ["X-ray"] },
            { name: "Freelancer Profile Search", category: "Data", description: "X-ray Freelancer.com to find professional profiles.", url: "https://www.google.com/search?q=site:freelancer.com/u", tags: ["X-ray"] }
        ];

        let currentCategory = 'all';

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message || "Copied!";
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function copyLink(url) {
            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast(`Link copied!`);
        }

        function shareFullList() {
            const fullText = tools.map(t => `${t.name} [${t.category}]: ${t.url}`).join('\n');
            const el = document.createElement('textarea');
            el.value = fullText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast(`Exported ${tools.length} high-quality tools!`);
        }

        function renderTools(filteredTools) {
            const grid = document.getElementById('toolsGrid');
            const emptyState = document.getElementById('emptyState');
            
            grid.innerHTML = '';
            
            if (filteredTools.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            filteredTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = "tool-card rounded-2xl p-6 flex flex-col h-full";
                
                let catStyle = "bg-slate-800 text-slate-300";
                if (tool.category === 'SERP') catStyle = "bg-yellow-500/10 text-yellow-400 border-yellow-500/20";
                if (tool.category === 'AI tools.') catStyle = "bg-cyan-500/10 text-cyan-400 border-cyan-500/20";
                if (tool.category === 'Reddit') catStyle = "bg-orange-500/10 text-orange-400 border-orange-500/20";
                if (tool.category === 'OSINT') catStyle = "bg-blue-500/10 text-blue-400 border-blue-500/20";
                if (tool.category === 'Engineering') catStyle = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                if (tool.category === 'Intel') catStyle = "bg-purple-500/10 text-purple-400 border-purple-500/20";
                if (tool.category === 'Outreach') catStyle = "bg-pink-500/10 text-pink-400 border-pink-500/20";
                if (tool.category === 'Verify') catStyle = "bg-red-500/10 text-red-400 border-red-500/20";

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-5">
                        <span class="px-2.5 py-0.5 rounded-md text-[10px] font-black uppercase tracking-widest border ${catStyle}">
                            ${tool.category}
                        </span>
                        <div class="flex gap-2">
                            <button onclick="copyLink('${tool.url}')" class="p-2 text-emerald-400 hover:text-emerald-300 hover:bg-emerald-500/10 rounded-xl transition-all" title="Copy URL">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                            <a href="${tool.url}" target="_blank" class="p-2 text-sky-400 hover:text-sky-300 hover:bg-sky-500/10 rounded-xl transition-all" title="Visit Tool">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                            </a>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-3 leading-tight tracking-tight">${tool.name}</h3>
                    <p class="text-slate-400 text-sm mb-8 flex-grow leading-relaxed line-clamp-3">${tool.description}</p>
                    <div class="flex flex-wrap gap-1.5 mt-auto pt-4 border-t border-slate-800/50">
                        ${tool.tags.map(tag => `<span class="bg-slate-800/40 text-slate-500 px-2 py-0.5 rounded text-[9px] font-bold border border-slate-700/50 uppercase tracking-tighter">${tag}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterTools() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = tools.filter(tool => {
                const matchesSearch = tool.name.toLowerCase().includes(searchTerm) || 
                                     tool.description.toLowerCase().includes(searchTerm) ||
                                     tool.tags.some(tag => tag.toLowerCase().includes(searchTerm));
                const matchesCategory = currentCategory === 'all' || tool.category === currentCategory;
                return matchesSearch && matchesCategory;
            });
            renderTools(filtered);
        }

        document.getElementById('categoryFilters').addEventListener('click', (e) => {
            if (e.target.classList.contains('category-pill')) {
                document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-category');
                filterTools();
            }
        });

        // Initialize display
        renderTools(tools);
    </script>
</body>
</html>
