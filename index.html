        let currentCategory = 'all';

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message || "Copied!";
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function copyLink(url) {
            const el = document.createElement('textarea');
            el.value = url;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast(`Link copied!`);
        }

        function shareFullList() {
            // Explicit deduplication to ensure export count is correct
            const uniqueTools = Array.from(new Set(tools.map(a => a.name)))
                                .map(name => tools.find(a => a.name === name));
            const fullText = uniqueTools.map(t => `${t.name} [${t.category}]: ${t.url}`).join('\n');
            const el = document.createElement('textarea');
            el.value = fullText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast(`Exported ${uniqueTools.length} unique tools!`);
        }

        function renderTools(filteredTools) {
            const grid = document.getElementById('toolsGrid');
            const emptyState = document.getElementById('emptyState');
            
            grid.innerHTML = '';
            
            // Deduplicate for rendering
            const renderedIds = new Set();
            const uniqueToRender = filteredTools.filter(t => {
                if (renderedIds.has(t.name)) return false;
                renderedIds.add(t.name);
                return true;
            });
            
            if (uniqueToRender.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }

            uniqueToRender.forEach(tool => {
                const card = document.createElement('div');
                card.className = "tool-card rounded-2xl p-6 flex flex-col h-full";
                
                let catStyle = "bg-slate-800 text-slate-300";
                if (tool.category === 'Productivity') catStyle = "bg-blue-500/10 text-blue-400 border-blue-500/20";
                if (tool.category === 'Learning') catStyle = "bg-purple-500/10 text-purple-400 border-purple-500/20";
                if (tool.category === 'SERP') catStyle = "bg-yellow-500/10 text-yellow-400 border-yellow-500/20";
                if (tool.category === 'AI tools.') catStyle = "bg-cyan-500/10 text-cyan-400 border-cyan-500/20";
                if (tool.category === 'Reddit') catStyle = "bg-orange-500/10 text-orange-400 border-orange-500/20";
                if (tool.category === 'OSINT') catStyle = "bg-blue-500/10 text-blue-400 border-blue-500/20";
                if (tool.category === 'Engineering') catStyle = "bg-emerald-500/10 text-emerald-400 border-emerald-500/20";
                if (tool.category === 'Intel') catStyle = "bg-purple-500/10 text-purple-400 border-purple-500/20";
                if (tool.category === 'Outreach') catStyle = "bg-pink-500/10 text-pink-400 border-pink-500/20";
                if (tool.category === 'Verify') catStyle = "bg-red-500/10 text-red-400 border-red-500/20";

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-5">
                        <span class="px-2.5 py-0.5 rounded-md text-[10px] font-black uppercase tracking-widest border ${catStyle}">
                            ${tool.category}
                        </span>
                        <div class="flex gap-2">
                            <button onclick="copyLink('${tool.url}')" class="p-2 text-emerald-400 hover:text-emerald-300 hover:bg-emerald-500/10 rounded-xl transition-all" title="Copy URL">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                            <a href="${tool.url}" target="_blank" class="p-2 text-sky-400 hover:text-sky-300 hover:bg-sky-500/10 rounded-xl transition-all" title="Visit Tool">
                                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                            </a>
                        </div>
                    </div>
                    <h3 class="text-xl font-bold text-white mb-3 leading-tight tracking-tight">${tool.name}</h3>

            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = tools.filter(tool => {
                const matchesSearch = tool.name.toLowerCase().includes(searchTerm) || 
                                     tool.description.toLowerCase().includes(searchTerm) ||
                                     tool.tags.some(tag => tag.toLowerCase().includes(searchTerm));
                const matchesCategory = currentCategory === 'all' || tool.category === currentCategory;
                return matchesSearch && matchesCategory;
            });
            renderTools(filtered);
        }

        document.getElementById('categoryFilters').addEventListener('click', (e) => {
            if (e.target.classList.contains('category-pill')) {
                document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                currentCategory = e.target.getAttribute('data-category');
                filterTools();
            }
        });

        // Initialize display
        renderTools(tools);
    </script>
</body>
</html>
